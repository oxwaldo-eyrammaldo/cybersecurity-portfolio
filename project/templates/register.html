{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
<div class="container text-start" style="max-width: 400px;">
    <h2 class="mb-3 text-center">Create Account</h2>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form action="/register" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input autocomplete="off" autofocus class="form-control" id="username" name="username" type="text" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input class="form-control" id="password" name="password" type="password" required>
                </div>
                <div class="mb-3">
                    <label for="confirmation" class="form-label">Confirm Password</label>
                    <input class="form-control" id="confirmation" name="confirmation" type="password" required>
                </div>
                <button class="btn btn-danger w-100" type="submit">Register</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
