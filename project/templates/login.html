{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
<div class="container text-start" style="max-width: 400px;">
    <h2 class="mb-3 text-center">Log In</h2>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form action="/login" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input autocomplete="off" autofocus class="form-control" id="username" name="username" type="text" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input class="form-control" id="password" name="password" type="password" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Log In</button>
            </form>
        </div>
    </div>
    <p class="text-center mt-3 small">Don't have an account? <a href="/register">Register here</a></p>
</div>
{% endblock %}
